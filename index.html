<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Portfolio | Junde Xu</title>
    <style>
        :root {
            --bg-color: #f4f4f4; 
            --transition-speed: 0.6s;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            transition: background-color var(--transition-speed) ease;
        }

        .slider-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Clean Slide Design */
        .slide {
            display: none;
            max-width: 95%;
            max-height: 90vh;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            animation: slideFade 0.7s ease-out;
        }

        .slide.active {
            display: block;
        }

        img {
            max-width: 100%;
            max-height: 90vh;
            display: block;
            border-radius: 2px;
        }

        /* Elegant Navigation */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #333;
            font-size: 3.5rem;
            padding: 20px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            opacity: 0.4;
        }

        .nav-btn:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }

        .prev { left: 3%; }
        .next { right: 3%; }

        /* Typography for Architecture */
        .project-caption {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #333;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 300;
        }

        @keyframes slideFade {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .nav-btn { font-size: 2rem; padding: 10px; }
            .slide { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>

        <div class="slide active" data-bg="#f4f4f4">
            <img src="page1.jpeg" alt="Portfolio Cover">
            <div class="project-caption">Junde Xu | Selected Works 2026</div>
        </div>

        <div class="slide" data-bg="#e9ecef">
            <img src="page2.jpeg" alt="Project Page 2">
            <div class="project-caption">Beyond the Waves | Master Thesis</div>
        </div>

        <div class="slide" data-bg="#ffffff">
            <img src="page3.jpeg" alt="Project Page 3">
            <div class="project-caption">Professional Practice | Design</div>
        </div>

        <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            
            currentSlide = (currentSlide + direction + slides.length) % slides.length;

            slides[currentSlide].classList.add('active');

            // Update background color based on project theme
            const newBg = slides[currentSlide].getAttribute('data-bg');
            document.documentElement.style.setProperty('--bg-color', newBg);
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") changeSlide(-1);
            if (e.key === "ArrowRight") changeSlide(1);
        });

        // Swipe support for your iPhone 17
        let touchstartX = 0;
        let touchendX = 0;
        
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (touchendX < touchstartX - 50) changeSlide(1);
            if (touchendX > touchstartX + 50) changeSlide(-1);
        });
    </script>
</body>
</html>
