<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junde Xu | Portfolio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff; /* Pure White */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none; /* Hides cursor initially for a gallery feel */
        }

        .slider-container:hover {
            cursor: auto;
        }

        /* The Slide */
        .slide {
            display: none;
            width: 100%;
            height: 100vh;
        }

        .slide.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img {
            max-width: 95vw;
            max-height: 90vh;
            display: block;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Navigation Arrows */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #000000;
            font-size: 4.5rem;
            padding: 50px;
            cursor: pointer;
            z-index: 10;
            opacity: 0; /* Hidden by default */
            transition: opacity 0.4s ease;
            user-select: none;
            outline: none;
        }

        /* Show arrows on container hover */
        .slider-container:hover .nav-btn {
            opacity: 0.15;
        }

        .nav-btn:hover {
            opacity: 0.8 !important;
        }

        .prev { left: 1%; }
        .next { right: 1%; }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .nav-btn {
                font-size: 2.5rem;
                padding: 15px;
                opacity: 0.3;
            }
            img {
                max-width: 100vw;
                max-height: 80vh;
            }
        }
    </style>
</head>
<body>

    <div class="slider-container" id="container">
        <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>

        <div class="slide active">
            <img src="page1.jpeg">
        </div>

        <div class="slide">
            <img src="page2.jpeg">
        </div>

        <div class="slide">
            <img src="page3.jpeg">
        </div>

        <div class="slide">
            <img src="page4.jpeg">
        </div>

        <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const container = document.getElementById('container');
        const nextBtn = document.querySelector('.next');
        const prevBtn = document.querySelector('.prev');

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        // Keyboard support (Left/Right arrows)
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") changeSlide(-1);
            if (e.key === "ArrowRight") changeSlide(1);
        });

        // Swipe support for your Phone
        let touchstartX = 0;
        let touchendX = 0;
        document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (touchendX < touchstartX - 50) changeSlide(1);
            if (touchendX > touchstartX + 50) changeSlide(-1);
        });

        // Auto-hide arrows when mouse stops moving
        let timer;
        document.addEventListener('mousemove', () => {
            container.style.cursor = 'auto';
            nextBtn.style.opacity = '0.15';
            prevBtn.style.opacity = '0.15';
            clearTimeout(timer);
            timer = setTimeout(() => {
                container.style.cursor = 'none';
                nextBtn.style.opacity = '0';
                prevBtn.style.opacity = '0';
            }, 2000); // Hides after 2 seconds of no movement
        });
    </script>
</body>
</html>
