<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junde Xu | Portfolio</title>
    <style>
        :root {
            --bg-color: #ffffff; /* Default to white */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.8s ease-in-out;
        }

        .slider-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .slide.active {
            display: flex;
        }

        img {
            max-width: 100vw;
            max-height: 100vh;
            display: block;
            object-fit: contain;
            user-select: none;
            /* This creates the 20% zoom out effect */
            transform: scale(0.8); 
            transition: transform 0.5s ease;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #000000;
            font-size: 3.5rem;
            padding: 30px;
            cursor: pointer;
            z-index: 100;
            opacity: 0.1;
            transition: opacity 0.3s ease;
        }

        .nav-btn:hover {
            opacity: 0.8;
        }

        .prev { left: 1%; }
        .next { right: 1%; }

        @media (max-width: 768px) {
            .nav-btn { font-size: 2rem; padding: 15px; opacity: 0.3; }
            img { transform: scale(0.9); /* Less zoom out on mobile */ }
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
        <div id="gallery"></div>
        <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const totalSlides = 33; 
        const gallery = document.getElementById('gallery');
        let currentSlide = 0;

        for (let i = 1; i <= totalSlides; i++) {
            const slide = document.createElement('div');
            slide.className = i === 1 ? 'slide active' : 'slide';
            
            let imageNum = i;
            if (i >= 17) imageNum = i + 1;

            const img = document.createElement('img');
            img.src = `Junde Xu's design portfolio ${imageNum}.jpeg`;
            img.crossOrigin = "Anonymous"; // Allows the script to read image colors

            // Sample color as soon as image loads
            img.onload = function() {
                if (i === 1) updateBackground(this);
            };

            slide.appendChild(img);
            gallery.appendChild(slide);
        }

        const slides = document.querySelectorAll('.slide');

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            
            const activeImg = slides[currentSlide].querySelector('img');
            if (activeImg.complete) {
                updateBackground(activeImg);
            } else {
                activeImg.onload = () => updateBackground(activeImg);
            }
        }

        function updateBackground(img) {
            try {
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                ctx.drawImage(img, 0, 0);
                
                // Sample pixel at (10,10) to match image background
                const pixel = ctx.getImageData(10, 10, 1, 1).data;
                const rgb = `rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`;
                document.documentElement.style.setProperty('--bg-color', rgb);
            } catch (e) {
                document.documentElement.style.setProperty('--bg-color', '#ffffff');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") changeSlide(-1);
            if (e.key === "ArrowRight") changeSlide(1);
        });

        let touchstartX = 0;
        document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
        document.addEventListener('touchend', e => {
            let touchendX = e.changedTouches[0].screenX;
            if (touchendX < touchstartX - 50) changeSlide(1);
            if (touchendX > touchstartX + 50) changeSlide(-1);
        }, {passive: true});
    </script>
</body>
</html>
