<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Portfolio | Junde Xu</title>
    <style>
        :root {
            --bg-color: #f4f4f4; /* Default light grey */
            --transition-speed: 0.5s;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            transition: background-color var(--transition-speed) ease;
        }

        /* The Gallery Container */
        .slider-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            display: none;
            max-width: 90%;
            max-height: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            animation: fadeIn 0.8s ease;
        }

        .slide.active {
            display: block;
        }

        img {
            max-width: 100%;
            max-height: 85vh;
            display: block;
        }

        /* Navigation Arrows */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #333;
            font-size: 3rem;
            padding: 20px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            border-radius: 50%;
            line-height: 1;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-50%) scale(1.1);
        }

        .prev { left: 5%; }
        .next { right: 5%; }

        /* Project Info (Optional) */
        .project-caption {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>

        <div class="slide active" data-bg="#f4f4f4">
            <img src="page1.jpg" alt="Portfolio Cover">
            <div class="project-caption">Junde Xu | Portfolio 2026</div>
        </div>

        <div class="slide" data-bg="#e6f2ff">
            <img src="page2.jpg" alt="Floating Architecture">
            <div class="project-caption">Beyond the Waves | Master Thesis</div>
        </div>

        <div class="slide" data-bg="#ffffff">
            <img src="page3.jpg" alt="Interior Design">
            <div class="project-caption">La Belle Élégance | Residential</div>
        </div>

        <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function changeSlide(direction) {
            // Hide current slide
            slides[currentSlide].classList.remove('active');
            
            // Calculate next slide index
            currentSlide += direction;
            if (currentSlide >= slides.length) currentSlide = 0;
            if (currentSlide < 0) currentSlide = slides.length - 1;

            // Show new slide
            slides[currentSlide].classList.add('active');

            // Change background color smoothly
            const newBg = slides[currentSlide].getAttribute('data-bg');
            document.documentElement.style.setProperty('--bg-color', newBg);
        }

        // Allow arrow keys to navigate
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") changeSlide(-1);
            if (e.key === "ArrowRight") changeSlide(1);
        });
    </script>
</body>
</html>
