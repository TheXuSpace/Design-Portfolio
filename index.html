<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junde Xu | Portfolio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff; /* Matches your cover's white background */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .slide.active {
            display: flex;
        }

        img {
            max-width: 100vw; /* Allows the image to breathe */
            max-height: 100vh;
            display: block;
            object-fit: contain; /* CRITICAL: Prevents stretching/distortion */
            user-select: none;
        }

        /* Navigation Arrows */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #000000;
            font-size: 3.5rem;
            padding: 30px;
            cursor: pointer;
            z-index: 100;
            opacity: 0.1; /* Very faint so it doesn't distract from your work */
            transition: opacity 0.3s ease, transform 0.2s;
        }

        .nav-btn:hover {
            opacity: 0.8;
            transform: translateY(-50%) scale(1.1);
        }

        .prev { left: 2%; }
        .next { right: 2%; }

        @media (max-width: 768px) {
            .nav-btn { font-size: 2rem; padding: 15px; opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
        
        <div id="gallery"></div>

        <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <script>
        const totalSlides = 33; // Adjusted for the deleted page 17
        const gallery = document.getElementById('gallery');
        let currentSlide = 0;

        // Generate slides and handle the Page 17 skip
        for (let i = 1; i <= totalSlides; i++) {
            const slide = document.createElement('div');
            slide.className = i === 1 ? 'slide active' : 'slide';
            
            // Logic: if we are at or past the 17th slide, load image 18
            let imageNum = i;
            if (i >= 17) {
                imageNum = i + 1;
            }

            const img = document.createElement('img');
            // Ensure this matches your file extension (.jpeg or .jpg)
            img.src = `Junde Xu's design portfolio ${imageNum}.jpeg`;
            
            slide.appendChild(img);
            gallery.appendChild(slide);
        }

        const slides = document.querySelectorAll('.slide');

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") changeSlide(-1);
            if (e.key === "ArrowRight") changeSlide(1);
        });

        // Swipe navigation for mobile
        let touchstartX = 0;
        document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
        document.addEventListener('touchend', e => {
            let touchendX = e.changedTouches[0].screenX;
            if (touchendX < touchstartX - 50) changeSlide(1);
            if (touchendX > touchstartX + 50) changeSlide(-1);
        }, {passive: true});
    </script>
</body>
</html>
