<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junde Xu | Portfolio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100vh;
        }

        .slide.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img {
            max-width: 95vw;
            max-height: 90vh;
            display: block;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #000000;
            font-size: 4rem;
            padding: 40px;
            cursor: pointer;
            z-index: 10;
            opacity: 0.1;
            transition: opacity 0.3s ease;
        }

        .nav-btn:hover {
            opacity: 0.8;
        }

        .prev { left: 2%; }
        .next { right: 2%; }

        @media (max-width: 768px) {
            .nav-btn { font-size: 2.5rem; padding: 15px; opacity: 0.3; }
            img { max-width: 100vw; }
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>

        <div class="slide active">
            <img src="Junde Xu's design portfolio 1.jpeg">
        </div>

        <div class="slide">
            <img src="Junde Xu's design portfolio 2.jpeg">
        </div>

        <div class="slide">
            <img src="Junde Xu's design portfolio 3.jpeg">
        </div>

        <div class="slide">
            <img src="Junde Xu's design portfolio 4.jpeg">
        </div>

        <div class="slide">
            <img src="Junde Xu's design portfolio 5.jpeg">
        </div>

        <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") changeSlide(-1);
            if (e.key === "ArrowRight") changeSlide(1);
        });

        let touchstartX = 0;
        let touchendX = 0;
        document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (touchendX < touchstartX - 50) changeSlide(1);
            if (touchendX > touchstartX + 50) changeSlide(-1);
        });
    </script>
</body>
</html>
